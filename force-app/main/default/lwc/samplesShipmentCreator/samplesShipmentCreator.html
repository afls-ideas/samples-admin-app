<template>
    <lightning-card title="Samples Shipment Creator" icon-name="standard:shipment">

        <div slot="actions">
            <lightning-button label="Back to Menu" onclick={handleBackToMenu} variant="neutral"></lightning-button>
        </div>

        <!-- Step Progress -->
        <div class="slds-p-horizontal_medium slds-p-top_small">
            <lightning-progress-indicator current-step={currentStep} type="path">
                <lightning-progress-step label="Select Source & Destination" value="1"></lightning-progress-step>
                <lightning-progress-step label="Select Products" value="2"></lightning-progress-step>
                <lightning-progress-step label="Review & Submit" value="3"></lightning-progress-step>
            </lightning-progress-indicator>
        </div>

        <!-- Step 1: Select Source & Destination -->
        <template if:true={isStep1}>
            <div class="slds-p-around_medium">
                <div class="slds-text-heading_small slds-m-bottom_medium">
                    Select source warehouse and destination reps
                </div>

                <!-- Source Warehouse -->
                <div class="slds-m-bottom_medium">
                    <lightning-combobox
                        label="Source Location"
                        value={selectedWarehouseId}
                        options={warehouseOptions}
                        placeholder="Select a warehouse..."
                        onchange={handleWarehouseChange}
                        required>
                    </lightning-combobox>
                </div>

                <!-- Destination Reps -->
                <div class="slds-form-element slds-m-bottom_x-small">
                    <label class="slds-form-element__label">
                        <abbr class="slds-required" title="required">*</abbr>
                        Destination Reps
                        <lightning-helptext
                            content="Select one or more reps. The same samples and quantities will be shipped to each selected rep. Click a territory name to select/deselect all reps in it.">
                        </lightning-helptext>
                    </label>
                </div>

                <div class="slds-grid slds-gutters">
                    <!-- Territory Tree (left) -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_7-of-12">
                        <div class="slds-box">
                            <div class="slds-m-bottom_small">
                                <lightning-input
                                    type="search"
                                    label="Search"
                                    placeholder="Search by territory or rep name..."
                                    value={repSearchTerm}
                                    onchange={handleRepTreeSearch}>
                                </lightning-input>
                            </div>
                            <div class="rep-tree-container">
                                <!-- Level 0 -->
                                <template for:each={repTreeData} for:item="l0">
                                    <div key={l0.territoryId} class="tree-node">
                                        <div class="tree-territory-row">
                                            <template if:true={l0.hasChildren}>
                                                <lightning-button-icon
                                                    icon-name={l0.expandIcon}
                                                    variant="bare"
                                                    size="small"
                                                    alternative-text="Toggle"
                                                    data-territory-id={l0.territoryId}
                                                    onclick={handleRepTreeToggle}>
                                                </lightning-button-icon>
                                            </template>
                                            <template if:false={l0.hasChildren}>
                                                <span class="tree-spacer"></span>
                                            </template>
                                            <span class="tree-territory-name"
                                                  data-territory-id={l0.territoryId}
                                                  onclick={handleTerritorySelect}>{l0.name}</span>
                                            <template if:true={l0.repCount}>
                                                <lightning-badge label={l0.repCount} class="slds-m-left_xx-small"></lightning-badge>
                                            </template>
                                        </div>
                                        <template if:true={l0.isExpanded}>
                                            <template for:each={l0.users} for:item="user">
                                                <div key={user.key} class="tree-user-row tree-indent-1">
                                                    <lightning-input
                                                        type="checkbox"
                                                        variant="label-hidden"
                                                        label="Select"
                                                        checked={user.isSelected}
                                                        data-location-id={user.locationId}
                                                        data-user-name={user.name}
                                                        onchange={handleRepSelect}>
                                                    </lightning-input>
                                                    <span class="tree-user-name"
                                                          data-location-id={user.locationId}
                                                          data-user-name={user.name}
                                                          onclick={handleRepSelect}>{user.name}</span>
                                                </div>
                                            </template>
                                            <!-- Level 1 -->
                                            <template for:each={l0.children} for:item="l1">
                                                <div key={l1.territoryId} class="tree-node tree-indent-1">
                                                    <div class="tree-territory-row">
                                                        <template if:true={l1.hasChildren}>
                                                            <lightning-button-icon
                                                                icon-name={l1.expandIcon}
                                                                variant="bare"
                                                                size="small"
                                                                alternative-text="Toggle"
                                                                data-territory-id={l1.territoryId}
                                                                onclick={handleRepTreeToggle}>
                                                            </lightning-button-icon>
                                                        </template>
                                                        <template if:false={l1.hasChildren}>
                                                            <span class="tree-spacer"></span>
                                                        </template>
                                                        <span class="tree-territory-name"
                                                              data-territory-id={l1.territoryId}
                                                              onclick={handleTerritorySelect}>{l1.name}</span>
                                                        <template if:true={l1.repCount}>
                                                            <lightning-badge label={l1.repCount} class="slds-m-left_xx-small"></lightning-badge>
                                                        </template>
                                                    </div>
                                                    <template if:true={l1.isExpanded}>
                                                        <template for:each={l1.users} for:item="user">
                                                            <div key={user.key} class="tree-user-row tree-indent-1">
                                                                <lightning-input
                                                                    type="checkbox"
                                                                    variant="label-hidden"
                                                                    label="Select"
                                                                    checked={user.isSelected}
                                                                    data-location-id={user.locationId}
                                                                    data-user-name={user.name}
                                                                    onchange={handleRepSelect}>
                                                                </lightning-input>
                                                                <span class="tree-user-name"
                                                                      data-location-id={user.locationId}
                                                                      data-user-name={user.name}
                                                                      onclick={handleRepSelect}>{user.name}</span>
                                                            </div>
                                                        </template>
                                                        <!-- Level 2 -->
                                                        <template for:each={l1.children} for:item="l2">
                                                            <div key={l2.territoryId} class="tree-node tree-indent-1">
                                                                <div class="tree-territory-row">
                                                                    <template if:true={l2.hasChildren}>
                                                                        <lightning-button-icon
                                                                            icon-name={l2.expandIcon}
                                                                            variant="bare"
                                                                            size="small"
                                                                            alternative-text="Toggle"
                                                                            data-territory-id={l2.territoryId}
                                                                            onclick={handleRepTreeToggle}>
                                                                        </lightning-button-icon>
                                                                    </template>
                                                                    <template if:false={l2.hasChildren}>
                                                                        <span class="tree-spacer"></span>
                                                                    </template>
                                                                    <span class="tree-territory-name"
                                                                          data-territory-id={l2.territoryId}
                                                                          onclick={handleTerritorySelect}>{l2.name}</span>
                                                                    <template if:true={l2.repCount}>
                                                                        <lightning-badge label={l2.repCount} class="slds-m-left_xx-small"></lightning-badge>
                                                                    </template>
                                                                </div>
                                                                <template if:true={l2.isExpanded}>
                                                                    <template for:each={l2.users} for:item="user">
                                                                        <div key={user.key} class="tree-user-row tree-indent-1">
                                                                            <lightning-input
                                                                                type="checkbox"
                                                                                variant="label-hidden"
                                                                                label="Select"
                                                                                checked={user.isSelected}
                                                                                data-location-id={user.locationId}
                                                                                data-user-name={user.name}
                                                                                onchange={handleRepSelect}>
                                                                            </lightning-input>
                                                                            <span class="tree-user-name"
                                                                                  data-location-id={user.locationId}
                                                                                  data-user-name={user.name}
                                                                                  onclick={handleRepSelect}>{user.name}</span>
                                                                        </div>
                                                                    </template>
                                                                    <!-- Level 3 -->
                                                                    <template for:each={l2.children} for:item="l3">
                                                                        <div key={l3.territoryId} class="tree-node tree-indent-1">
                                                                            <div class="tree-territory-row">
                                                                                <template if:true={l3.hasChildren}>
                                                                                    <lightning-button-icon
                                                                                        icon-name={l3.expandIcon}
                                                                                        variant="bare"
                                                                                        size="small"
                                                                                        alternative-text="Toggle"
                                                                                        data-territory-id={l3.territoryId}
                                                                                        onclick={handleRepTreeToggle}>
                                                                                    </lightning-button-icon>
                                                                                </template>
                                                                                <template if:false={l3.hasChildren}>
                                                                                    <span class="tree-spacer"></span>
                                                                                </template>
                                                                                <span class="tree-territory-name"
                                                                                      data-territory-id={l3.territoryId}
                                                                                      onclick={handleTerritorySelect}>{l3.name}</span>
                                                                                <template if:true={l3.repCount}>
                                                                                    <lightning-badge label={l3.repCount} class="slds-m-left_xx-small"></lightning-badge>
                                                                                </template>
                                                                            </div>
                                                                            <template if:true={l3.isExpanded}>
                                                                                <template for:each={l3.users} for:item="user">
                                                                                    <div key={user.key} class="tree-user-row tree-indent-1">
                                                                                        <lightning-input
                                                                                            type="checkbox"
                                                                                            variant="label-hidden"
                                                                                            label="Select"
                                                                                            checked={user.isSelected}
                                                                                            data-location-id={user.locationId}
                                                                                            data-user-name={user.name}
                                                                                            onchange={handleRepSelect}>
                                                                                        </lightning-input>
                                                                                        <span class="tree-user-name"
                                                                                              data-location-id={user.locationId}
                                                                                              data-user-name={user.name}
                                                                                              onclick={handleRepSelect}>{user.name}</span>
                                                                                    </div>
                                                                                </template>
                                                                                <!-- Level 4 -->
                                                                                <template for:each={l3.children} for:item="l4">
                                                                                    <div key={l4.territoryId} class="tree-node tree-indent-1">
                                                                                        <div class="tree-territory-row">
                                                                                            <span class="tree-spacer"></span>
                                                                                            <span class="tree-territory-name"
                                                                                                  data-territory-id={l4.territoryId}
                                                                                                  onclick={handleTerritorySelect}>{l4.name}</span>
                                                                                            <template if:true={l4.repCount}>
                                                                                                <lightning-badge label={l4.repCount} class="slds-m-left_xx-small"></lightning-badge>
                                                                                            </template>
                                                                                        </div>
                                                                                        <template for:each={l4.users} for:item="user">
                                                                                            <div key={user.key} class="tree-user-row tree-indent-1">
                                                                                                <lightning-input
                                                                                                    type="checkbox"
                                                                                                    variant="label-hidden"
                                                                                                    label="Select"
                                                                                                    checked={user.isSelected}
                                                                                                    data-location-id={user.locationId}
                                                                                                    data-user-name={user.name}
                                                                                                    onchange={handleRepSelect}>
                                                                                                </lightning-input>
                                                                                                <span class="tree-user-name"
                                                                                                      data-location-id={user.locationId}
                                                                                                      data-user-name={user.name}
                                                                                                      onclick={handleRepSelect}>{user.name}</span>
                                                                                            </div>
                                                                                        </template>
                                                                                    </div>
                                                                                </template>
                                                                            </template>
                                                                        </div>
                                                                    </template>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </template>
                                                </div>
                                            </template>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>

                    <!-- Selected Reps Basket (right) -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_5-of-12">
                        <div class="slds-box">
                            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                                <div class="slds-col">
                                    <span class="slds-text-heading_small">Selected Reps ({selectedRepCount})</span>
                                </div>
                                <template if:true={hasSelectedReps}>
                                    <div class="slds-col_bump-left">
                                        <lightning-button-icon
                                            icon-name="utility:clear"
                                            alternative-text="Clear all"
                                            title="Clear all"
                                            onclick={handleClearReps}
                                            size="small">
                                        </lightning-button-icon>
                                    </div>
                                </template>
                            </div>

                            <template if:false={hasSelectedReps}>
                                <p class="slds-text-body_regular slds-text-color_weak slds-text-align_center slds-p-around_medium">
                                    Select reps from the territory tree to add them here.
                                </p>
                            </template>

                            <template if:true={hasSelectedReps}>
                                <div class="basket-container">
                                    <template for:each={selectedReps} for:item="rep">
                                        <div key={rep.locationId} class="basket-item">
                                            <span>{rep.name}</span>
                                            <lightning-button-icon
                                                icon-name="utility:close"
                                                alternative-text="Remove"
                                                title="Remove"
                                                data-location-id={rep.locationId}
                                                onclick={handleRemoveRep}
                                                size="x-small"
                                                variant="bare">
                                            </lightning-button-icon>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                <template if:true={isLoadingPreview}>
                    <lightning-spinner alternative-text="Loading warehouse inventory..." size="small" class="slds-m-top_medium"></lightning-spinner>
                </template>

                <template if:true={hasWarehousePreview}>
                    <div class="slds-m-top_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Warehouse Inventory</h3>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col">Product</th>
                                    <th scope="col">On Hand</th>
                                    <th scope="col">Batches</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={warehousePreview} for:item="item">
                                    <tr key={item.productItemId}>
                                        <td>{item.productName}</td>
                                        <td>
                                            <lightning-formatted-number value={item.quantityOnHand}></lightning-formatted-number>
                                        </td>
                                        <td>{item.batchCount}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                    <template if:true={selectedWarehouseId}>
                        <lightning-button
                            label="Manage Source Inventory"
                            icon-name="utility:settings"
                            onclick={handleManageInventory}
                            variant="neutral">
                        </lightning-button>
                    </template>
                    <template if:false={selectedWarehouseId}>
                        <div></div>
                    </template>
                    <lightning-button
                        variant="brand"
                        label="Next: Select Products"
                        onclick={handleNext}
                        disabled={isNextDisabled}>
                    </lightning-button>
                </div>
            </div>
        </template>

        <!-- Step 2: Select Products & Quantities -->
        <template if:true={isStep2}>
            <div class="slds-p-around_medium">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading inventory..." size="medium"></lightning-spinner>
                </template>

                <template if:false={isLoading}>
                    <div class="slds-text-heading_small slds-m-bottom_medium">
                        Select samples and quantities to ship to {selectedRepCount} reps
                    </div>

                    <template if:true={hasNoInventory}>
                        <div class="slds-illustration slds-illustration_small slds-p-around_medium">
                            <p class="slds-text-body_regular slds-text-color_weak">
                                No inventory found at the selected warehouse.
                            </p>
                        </div>
                    </template>

                    <template for:each={inventoryData} for:item="product">
                        <div key={product.key} class="product-section slds-box slds-m-bottom_small">
                            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_small">
                                <div class="slds-col">
                                    <span class="slds-text-heading_small">{product.productName}</span>
                                </div>
                                <div class="slds-col_bump-left">
                                    <span class="slds-badge">On Hand: {product.quantityOnHand}</span>
                                </div>
                            </div>

                            <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col">Batch / Lot</th>
                                        <th scope="col">Expiration</th>
                                        <th scope="col">Available</th>
                                        <th scope="col">Quantity to Ship (per rep)</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={product.batches} for:item="batch">
                                        <tr key={batch.key}>
                                            <td>{batch.batchName}</td>
                                            <td>
                                                <lightning-formatted-date-time
                                                    value={batch.expirationDate}
                                                    year="numeric"
                                                    month="short"
                                                    day="2-digit">
                                                </lightning-formatted-date-time>
                                            </td>
                                            <td>{batch.remainingQuantity}</td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    label="Quantity"
                                                    value={batch.selectedQuantity}
                                                    min="0"
                                                    max={batch.remainingQuantity}
                                                    step="1"
                                                    data-product-index={batch.productIndex}
                                                    data-batch-index={batch.batchIndex}
                                                    onchange={handleQuantityChange}
                                                    class="quantity-input">
                                                </lightning-input>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                        <lightning-button
                            label="Back"
                            onclick={handleBack}>
                        </lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Review Shipment"
                            onclick={handleReview}
                            disabled={isReviewDisabled}>
                        </lightning-button>
                    </div>
                </template>
            </div>
        </template>

        <!-- Step 3: Review & Submit -->
        <template if:true={isStep3}>
            <div class="slds-p-around_medium">
                <template if:false={shipmentCreated}>
                    <div class="slds-text-heading_small slds-m-bottom_medium">
                        Review shipment details
                    </div>

                    <div class="slds-grid slds-gutters slds-m-bottom_medium">
                        <div class="slds-col slds-size_1-of-2">
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label slds-text-color_weak">From:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedWarehouseName}</dd>
                                <dt class="slds-dl_horizontal__label slds-text-color_weak">To:</dt>
                                <dd class="slds-dl_horizontal__detail">{selectedRepNames} ({selectedRepCount} reps)</dd>
                                <dt class="slds-dl_horizontal__label slds-text-color_weak">Units per rep:</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <strong>{totalQuantity}</strong>
                                </dd>
                            </dl>
                        </div>
                    </div>

                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Product</th>
                                <th scope="col">Batch / Lot</th>
                                <th scope="col">Expiration</th>
                                <th scope="col">Quantity (per rep)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={selectedItems} for:item="item">
                                <tr key={item.key}>
                                    <td>{item.productName}</td>
                                    <td>{item.batchName}</td>
                                    <td>
                                        <lightning-formatted-date-time
                                            value={item.expirationDate}
                                            year="numeric"
                                            month="short"
                                            day="2-digit">
                                        </lightning-formatted-date-time>
                                    </td>
                                    <td>{item.quantity}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <div class="slds-m-top_medium slds-grid slds-grid_align-spread">
                        <lightning-button
                            label="Back"
                            onclick={handleBack}>
                        </lightning-button>
                        <lightning-button
                            variant="brand"
                            label="Submit Shipments"
                            onclick={handleSubmit}
                            disabled={isSubmitting}>
                        </lightning-button>
                    </div>

                    <template if:true={isSubmitting}>
                        <lightning-spinner alternative-text="Creating shipments..." size="medium"></lightning-spinner>
                    </template>
                </template>

                <template if:true={shipmentCreated}>
                    <div class="slds-text-heading_small slds-m-bottom_medium">
                        Results
                    </div>

                    <div class="slds-notify slds-notify_alert slds-alert_texture slds-theme_success slds-m-bottom_medium" role="alert">
                        <h2>{shipmentSuccessCount} of {selectedRepCount} shipments created successfully.</h2>
                    </div>

                    <template if:true={hasShipmentFailures}>
                        <div class="slds-notify slds-notify_alert slds-alert_texture slds-theme_warning slds-m-bottom_medium" role="alert">
                            <h2>{shipmentFailureCount} shipments could not be created. See details below.</h2>
                        </div>
                    </template>

                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped">
                        <thead>
                            <tr class="slds-line-height_reset">
                                <th scope="col">Rep</th>
                                <th scope="col">Status</th>
                                <th scope="col">Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={shipmentResults} for:item="result">
                                <tr key={result.repLocationId}>
                                    <td>{result.repName}</td>
                                    <td>
                                        <template if:true={result.success}>
                                            <lightning-badge label="Created" class="slds-theme_success"></lightning-badge>
                                        </template>
                                        <template if:false={result.success}>
                                            <lightning-badge label="Failed" class="slds-theme_error"></lightning-badge>
                                        </template>
                                    </td>
                                    <td>{result.message}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                    <div class="slds-m-top_large slds-text-align_center">
                        <lightning-button
                            variant="brand"
                            label="Create Another Shipment"
                            onclick={handleReset}>
                        </lightning-button>
                    </div>
                </template>
            </div>
        </template>

    </lightning-card>
</template>
